<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#0a0a0b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0b;padding:40px 20px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#111113;border:1px solid #232328;border-radius:12px;padding:40px 32px;">
            <tr>
              <td>
                <p style="margin:0 0 32px;font-size:20px;font-weight:700;color:#f5f5f4;letter-spacing:-0.02em;">
                  Labia<span style="color:#ff6b1a;">.ia</span>
                </p>

                <h1 style="margin:0 0 16px;font-size:22px;font-weight:700;color:#f5f5f4;letter-spacing:-0.02em;">
                  Confirme seu e-mail
                </h1>

                <p style="margin:0 0 28px;font-size:15px;line-height:1.6;color:#8f8f98;">
                  Falta um passo para começar. Clique no botão abaixo para
                  confirmar seu endereço e ativar sua conta.
                </p>

                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="background:#ff6b1a;border-radius:8px;">
                      <a href="{{ .ConfirmationURL }}"
                         style="display:inline-block;padding:13px 28px;font-size:15px;font-weight:600;color:#16120a;text-decoration:none;">
                        Confirmar e-mail
                      </a>
                    </td>
                  </tr>
                </table>

                <p style="margin:28px 0 0;font-size:13px;line-height:1.6;color:#5d5d66;">
                  Se você não criou uma conta na Labia.ia, pode ignorar
                  esta mensagem com segurança.
                </p>
              </td>
            </tr>
          </table>

          <p style="margin:24px 0 0;font-size:12px;color:#5d5d66;">
            Labia.ia — conversas mais naturais, mais confiança.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
